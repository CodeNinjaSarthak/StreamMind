[tool.black]
line-length = 119
target-version = ['py313']
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | migrations
  | __pycache__
)/
'''

[tool.isort]
profile = "black"
line_length = 119
skip = ["venv", "migrations", ".venv"]
multi_line_output = 3
force_grid_wrap = 2
known_first_party = ["backend", "workers"]

[tool.ruff]
line-length = 119
exclude = [
    ".git",
    ".venv",
    "venv",
    "migrations",
    "*.ipynb",
    "__pycache__",
]
[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["E402"]
"workers/*/worker.py" = ["E402"]
"workers/runner.py" = ["E402"]
"backend/alembic/*" = ["E402", "F401"]
"backend/app/main.py" = ["E402"]

[tool.flake8]
max-line-length = 119
ignore = ["D107", "D212", "E501", "W503", "W605", "D203", "D100"]
docstring-convention = "all"

[tool.pylint.main]
ignore-paths = ["backend/alembic/versions/"]
disable = [
    "line-too-long",
    "trailing-whitespace",
    "missing-function-docstring",
    "missing-module-docstring",
    "missing-class-docstring",
    "consider-using-f-string",
    "import-error",
    "too-few-public-methods",
    "redefined-outer-name",
    "wrong-import-position",
    "wrong-import-order",
    "ungrouped-imports",
    "invalid-name",
    "logging-fstring-interpolation",
    "global-statement",
    "global-variable-not-assigned",
    "unnecessary-pass",
    "fixme",
    "pointless-string-statement",
    "broad-exception-caught",
    "duplicate-code",
    "too-many-locals",
    "too-many-arguments",
    "too-many-branches",
    "too-many-statements",
    "too-many-nested-blocks",
    "too-many-instance-attributes",
    "unused-argument",
    "unused-import",
    "unused-variable",
    "no-member",
    "import-outside-toplevel",
    "raise-missing-from",
    "not-callable",
    "singleton-comparison",
    "no-else-continue",
    "implicit-str-concat",
    "keyword-arg-before-vararg",
    "missing-timeout",
    "subprocess-run-check",
    "protected-access",
]

[tool.radon]
max_complexity = 10

[tool.pytest.ini_options]
testpaths = ["backend/tests", "workers"]
python_files = ["test_*.py", "*_test.py"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]

[tool.coverage.run]
source = ["backend", "workers"]
omit = [
    "*/tests/*",
    "*/migrations/*",
    "*/venv/*",
]

